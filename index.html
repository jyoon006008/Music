<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Cloud Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #root {
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
    </style>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom/client.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        function PointCloudPlayer() {
            const mountRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isLoaded, setIsLoaded] = useState(false);
            const [trackIndex, setTrackIndex] = useState(0);
            
            // Volume state & refs
            const [volume, setVolume] = useState(1.0);
            const volumeRef = useRef(1.0);
            const gainNodeRef = useRef(null);
            const dragStartVolumeRef = useRef(1.0);
            const carouselAngleRef = useRef(0);
            const targetCarouselAngleRef = useRef(0);
            const dragStartAngleRef = useRef(0);
            const orbitRadiusRef = useRef(0);
            const orbitOpacityRef = useRef(0);
            const longPressScaleBoostRef = useRef(0);
            const autoRotateAngleRef = useRef(0);
            const albumMeshesRef = useRef([]);
            
            // Ring Progress State
            const hitRingRef = useRef(null);
            const ringGroupRef = useRef(null);
            const progressKnobRef = useRef(null);
            const ringUniformsRef = useRef(null);
            const isDraggingProgressRef = useRef(false);
            const progressDragValueRef = useRef(0);
            const durationRef = useRef(0);
            const [dragTimeDisplay, setDragTimeDisplay] = useState(null);

            // Web Audio API refs for analysis
            const audioCtxRef = useRef(null);
            const analyserRef = useRef(null);
            const dataArrayRef = useRef(null);
            const audioBufferRef = useRef(null);
            const sourceNodeRef = useRef(null);
            const playbackTimeRef = useRef(0);
            const startTimeRef = useRef(0);
            
            // Interaction & Swipe refs
            const isPlayingRef = useRef(false);
            const pointerDownRef = useRef(false);
            const pointerStartXRef = useRef(0);
            const pointerStartYRef = useRef(0);
            const pointerAxisRef = useRef(null);

            // Three.js refs for raycasting
            const cameraRef = useRef(null);
            const sphereRef = useRef(null);
            const sphereUniformsRef = useRef(null);
            const raycasterRef = useRef(new THREE.Raycaster());
            const mouseRef = useRef(new THREE.Vector2());

            // New Long Press & Album UI refs
            const [showAlbums, setShowAlbums] = useState(false);
            const showAlbumsRef = useRef(false);
            const longPressTimerRef = useRef(null);

            const safeStopAndDisconnect = (node) => {
                if (!node) return;
                node.onended = null;
                try { node.stop(); } catch(e) {}
                try { node.disconnect(); } catch(e) {}
            };

            const tracks = [
                { url: "./2%20soon.mp3", image: "2soon.png", title: "2 soon", artist: "keshi" },
                { url: "./Any%20song%20(%EC%95%84%EB%AC%B4%EB%85%B8%EB%9E%98).mp3", image: "anysong.png", title: "아무노래 (Any Song)", artist: "지코 (ZICO)" },
                { url: "./Beautiful%20Mistakes.mp3", image: "beautifulmistakes.png", title: "Beautiful Mistakes", artist: "Maroon 5 & Megan Thee Stallion" },
                { url: "./Boat.mp3", image: "boat.png", title: "Boat", artist: "죠지" },
                { url: "./Girls%20Like%20You%20(Cardi%20B%20Version).mp3", image: "girlslikeyou.png", title: "Girls Like You (Cardi B Version)", artist: "Maroon 5 (feat. Cardi B)" },
                { url: "./Kids%20Are%20Born%20Stars.mp3", image: "kidsarebornstars.png", title: "Kids Are Born Stars", artist: "Lauv" },
                { url: "./Sad%20Forever.mp3", image: "sadforever.png", title: "Sad Forever", artist: "Lauv" },
                { url: "./Summer%20(Feat.%20BEO).mp3", image: "summer.png", title: "Summer", artist: "Paul Blanco (feat. BE'O(비오))" },
                { url: "./Yesterday%20(Yesterday).mp3", image: "yesterday.png", title: "Yesterday", artist: "박재범" },
                { url: "./download.mp3", image: "canilove.png", title: "Can I Love ?", artist: "Cosmic Boy (feat. Meego, 유라)" }
            ];

            useEffect(() => {
                let isActive = true;
                const initAudio = async () => {
                    setIsLoaded(false);
                    try {
                        if (!audioCtxRef.current) {
                            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                            const analyser = audioCtx.createAnalyser();
                            analyser.fftSize = 256;
                            
                            const gainNode = audioCtx.createGain();
                            gainNode.gain.value = volumeRef.current;
                            
                            audioCtxRef.current = audioCtx;
                            analyserRef.current = analyser;
                            gainNodeRef.current = gainNode;
                            dataArrayRef.current = new Uint8Array(analyser.frequencyBinCount);
                        }

                        if (sourceNodeRef.current) {
                            safeStopAndDisconnect(sourceNodeRef.current);
                            sourceNodeRef.current = null;
                        }

                        // Fetch requested track from CDN
                        const trackName = tracks[trackIndex].url.replace("./", "");
                        const response = await fetch(`https://cdn.jsdelivr.net/gh/jyoon006008/Music@main/${trackName}`);
                        const arrayBuffer = await response.arrayBuffer();
                        const audioBuffer = await audioCtxRef.current.decodeAudioData(arrayBuffer);
                        
                        if (!isActive) return;

                        audioBufferRef.current = audioBuffer;
                        durationRef.current = audioBuffer.duration; // Vital: saves track duration for seek
                        playbackTimeRef.current = 0;
                        setIsLoaded(true);

                        if (isPlayingRef.current && audioCtxRef.current) {
                            if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();
                            const source = audioCtxRef.current.createBufferSource();
                            source.buffer = audioBuffer;
                            
                            source.connect(analyserRef.current);
                            analyserRef.current.connect(gainNodeRef.current);
                            gainNodeRef.current.connect(audioCtxRef.current.destination);
                            
                            source.onended = () => {
                                targetCarouselAngleRef.current += 12;
                                setTrackIndex(prev => (prev + 1) % tracks.length);
                            };

                            source.start(0);
                            startTimeRef.current = audioCtxRef.current.currentTime;
                            sourceNodeRef.current = source;
                        }
                    } catch (err) {
                        console.error("Audio fetch/decode failed", err);
                    }
                };
                initAudio();
                
                return () => {
                    isActive = false;
                };
            }, [trackIndex]);

            // Three.js Scene Setup runs exactly once per mount
            useEffect(() => {
                const mount = mountRef.current;
                
                // Set up Scene, Camera, and Renderer
                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, mount.clientWidth / mount.clientHeight, 0.1, 1000);
                camera.position.z = 4.5;
                cameraRef.current = camera;

                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(mount.clientWidth, mount.clientHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                mount.appendChild(renderer.domElement);

                // --- Progress Ring Setup ---
                const ringGroup = new THREE.Group();
                ringGroup.lookAt(camera.position); // Ensure the ring perfectly faces the camera like a flat circular HUD
                scene.add(ringGroup);
                ringGroupRef.current = ringGroup;
                
                const ringInnerGroup = new THREE.Group();
                ringInnerGroup.scale.x = -1; // Flip X horizontally to make coordinates evaluate naturally clockwise
                ringInnerGroup.rotation.z = -Math.PI / 2; // -90deg Offset: aligns vUv 0.0 perfectly to TOP (12 o'clock) considering TRS matrix order
                ringGroup.add(ringInnerGroup);
                
                const ringUniforms = {
                    progress: { value: 0.0 }, // 0 to 1
                    color: { value: new THREE.Color(0xd1aaff) },
                    opacity: { value: 0.8 }
                };
                ringUniformsRef.current = ringUniforms;

                const ringMat = new THREE.ShaderMaterial({
                    uniforms: ringUniforms,
                    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                    fragmentShader: `varying vec2 vUv; uniform float progress; uniform vec3 color; uniform float opacity; void main() { if (vUv.x > progress) discard; gl_FragColor = vec4(color, opacity); }`,
                    transparent: true,
                    side: THREE.DoubleSide
                });

                const radius = 2.2; // Snug closely to the point cloud natively mapping 2.0 baseline
                const bgRing = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.012, 16, 128), new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15 }));
                // Thinner progress ring, barely thicker than the background ring
                const progressRing = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.018, 16, 128), ringMat);
                const hitRing = new THREE.Mesh(new THREE.TorusGeometry(radius, 0.6, 8, 32), new THREE.MeshBasicMaterial({visible: false}));
                
                // Add Knob (Small Circle at front of progress bar) - adjust size to match the thinner ring
                const knobMesh = new THREE.Mesh(new THREE.SphereGeometry(0.045, 16, 16), new THREE.MeshBasicMaterial({ color: 0xd1aaff }));
                progressKnobRef.current = knobMesh;

                ringInnerGroup.add(bgRing);
                ringInnerGroup.add(progressRing);
                ringInnerGroup.add(hitRing);
                ringInnerGroup.add(knobMesh);
                hitRingRef.current = hitRing;

                // --- 3D Carousel Setup ---
                const albumMeshes = [];
                const renderTracks = [...tracks, ...tracks, ...tracks]; // 30 items for very snug gap
                renderTracks.forEach((trackInfo, i) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 256; canvas.height = 340; // Taller for text
                    const ctx = canvas.getContext('2d');
                    
                    const r = 30;
                    // Placeholder background
                    ctx.fillStyle = '#2a1a4a';
                    ctx.beginPath();
                    ctx.moveTo(r, 0); ctx.lineTo(256-r, 0); ctx.quadraticCurveTo(256, 0, 256, r);
                    ctx.lineTo(256, 256-r); ctx.quadraticCurveTo(256, 256, 256-r, 256);
                    ctx.lineTo(r, 256); ctx.quadraticCurveTo(0, 256, 0, 256-r);
                    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
                    ctx.fill();
                    
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = 'bold 20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(trackInfo.title.substring(0, 15), 128, 128); // Fallback text
                    
                    const tex = new THREE.CanvasTexture(canvas);
                    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0, depthWrite: false });
                    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.73), mat); // Taller geometry matching aspect ratio
                    
                    // Trigger Image Load
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.src = `https://cdn.jsdelivr.net/gh/jyoon006008/Music@main/${trackInfo.image}`;
                    img.onload = () => {
                        ctx.clearRect(0, 0, 256, 340);
                        
                        // 1. Draw rounded clip area for the album cover (0 to 256)
                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(r, 0); ctx.lineTo(256-r, 0); ctx.quadraticCurveTo(256, 0, 256, r);
                        ctx.lineTo(256, 256-r); ctx.quadraticCurveTo(256, 256, 256-r, 256);
                        ctx.lineTo(r, 256); ctx.quadraticCurveTo(0, 256, 0, 256-r);
                        ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
                        ctx.closePath();
                        ctx.clip();
                        ctx.drawImage(img, 0, 0, 256, 256);
                        ctx.restore();

                        // 2. Draw text details below the album cover
                        ctx.textAlign = 'center';
                        
                        // Title
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold 24px sans-serif';
                        ctx.textBaseline = 'top';
                        let shortTitle = trackInfo.title;
                        if (shortTitle.length > 18) shortTitle = shortTitle.substring(0, 16) + '...';
                        ctx.fillText(shortTitle, 128, 275);
                        
                        // Artist
                        ctx.fillStyle = '#b3b3b3';
                        ctx.font = '18px sans-serif';
                        let shortArtist = trackInfo.artist;
                        if (shortArtist.length > 22) shortArtist = shortArtist.substring(0, 20) + '...';
                        ctx.fillText(shortArtist, 128, 305);
                        
                        tex.needsUpdate = true;
                    };
                    
                    const angle = i * (Math.PI * 2 / renderTracks.length); // 12 degrees
                    const radius = 2.6; // initial dummy radius

                    scene.add(mesh);
                    albumMeshes.push(mesh);
                });
                albumMeshesRef.current = albumMeshes;

                // --- 1. Create Point Cloud Sphere (Energy Field Shader) ---
                const sphereParticles = 6000;
                const sphereGeometry = new THREE.BufferGeometry();
                const spherePositions = new Float32Array(sphereParticles * 3);
                const sphereColors = new Float32Array(sphereParticles * 3);
                const spherePhase = new Float32Array(sphereParticles);
                const sphereSpeed = new Float32Array(sphereParticles);

                // Base purple color
                const baseColor = new THREE.Color(0x9b51e0);

                for (let i = 0; i < sphereParticles; i++) {
                    // Volumetric distribution: Math.pow(random, 0.4) concentrates slightly near surface, leaving some deep inside
                    const radius = 2.0 * Math.pow(Math.random(), 0.4);
                    // Distribute points evenly using spherical coordinates
                    const theta = Math.random() * 2 * Math.PI;
                    const phi = Math.acos((Math.random() * 2) - 1);
                    
                    const x = radius * Math.sin(phi) * Math.cos(theta);
                    const y = radius * Math.sin(phi) * Math.sin(theta);
                    const z = radius * Math.cos(phi);

                    spherePositions[i * 3] = x;
                    spherePositions[i * 3 + 1] = y;
                    spherePositions[i * 3 + 2] = z;

                    // Add color variation around purple
                    sphereColors[i * 3] = baseColor.r + (Math.random() - 0.5) * 0.3;
                    sphereColors[i * 3 + 1] = baseColor.g + (Math.random() - 0.5) * 0.3;
                    sphereColors[i * 3 + 2] = baseColor.b + (Math.random() - 0.5) * 0.3;
                    
                    // Specific animation rhythms for the shader
                    spherePhase[i] = Math.random() * Math.PI * 2; // Random start phase
                    sphereSpeed[i] = 0.5 + Math.random() * 1.5;   // Random pulsing frequency speed
                }

                sphereGeometry.setAttribute('position', new THREE.BufferAttribute(spherePositions, 3));
                sphereGeometry.setAttribute('color', new THREE.BufferAttribute(sphereColors, 3));
                sphereGeometry.setAttribute('aPhase', new THREE.BufferAttribute(spherePhase, 1));
                sphereGeometry.setAttribute('aSpeed', new THREE.BufferAttribute(sphereSpeed, 1));

                const sphereUniforms = {
                    uTime: { value: 0.0 },
                    uGlobalOpacity: { value: 0.8 }
                };
                sphereUniformsRef.current = sphereUniforms;

                const sphereMaterial = new THREE.ShaderMaterial({
                    uniforms: sphereUniforms,
                    vertexShader: `
                        attribute float aPhase;
                        attribute float aSpeed;
                        attribute vec3 color;
                        varying vec3 vColor;
                        varying float vAlpha;
                        uniform float uTime;
                        uniform float uGlobalOpacity;
                        
                        void main() {
                            vColor = color;
                            
                            // Radial distance mapped to create center vs outer rhythm differences
                            float dist = length(position);
                            
                            // Generate oscillating sine wave rhythm for this particle
                            float rhythm = sin(uTime * aSpeed + aPhase + dist * 2.0);
                            float normRhythm = (rhythm + 1.0) * 0.5; // 0.0 to 1.0
                            
                            vAlpha = 0.5 + 0.8 * normRhythm; // Brighter baseline limits opacity variation from 0.5 to 1.3
                            vAlpha *= uGlobalOpacity; // Apply bass reacting global visual fade modifier
                            
                            // Pulse position: scale softly mimicking breathing movement
                            vec3 pos = position * (0.95 + 0.05 * normRhythm);
                            
                            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                            gl_Position = projectionMatrix * mvPosition;
                            
                            // Make points slightly larger globally matching the brighter energy
                            gl_PointSize = (15.0 + 12.0 * normRhythm) * (1.0 / -mvPosition.z);
                        }
                    `,
                    fragmentShader: `
                        varying vec3 vColor;
                        varying float vAlpha;
                        
                        void main() {
                            // Perfect blurred circle rendering algorithm (GPU accelerated)
                            vec2 coord = gl_PointCoord - vec2(0.5);
                            float len = length(coord);
                            if(len > 0.5) discard;
                            
                            float strength = 1.0 - (len * 2.0); // Center is 1.0, Edge is 0.0
                            strength = smoothstep(0.0, 1.0, strength); // Feather the boundaries softly
                            
                            gl_FragColor = vec4(vColor * strength, vAlpha * strength);
                        }
                    `,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                const spherePointCloud = new THREE.Points(sphereGeometry, sphereMaterial);
                scene.add(spherePointCloud);
                sphereRef.current = spherePointCloud;

                // --- 2. Inner Play Triangle removed ---

                // --- Render Loop & Interactions ---
                let animationFrameId;

                const renderCanvas = () => {
                    let bassReact = 0;
                    
                    // Simple low-frequency analysis if audio is playing
                    if (analyserRef.current && dataArrayRef.current && sourceNodeRef.current) {
                        analyserRef.current.getByteFrequencyData(dataArrayRef.current);
                        
                        let sum = 0;
                        const bassLength = 10; // Focus on the lowest 10 frequency bins
                        for(let i = 0; i < bassLength; i++) {
                            sum += dataArrayRef.current[i];
                        }
                        // Normalize 0 to 1
                        bassReact = (sum / bassLength) / 255.0;
                    }

                    // Connected Orbit Interaction State
                    orbitOpacityRef.current += ((showAlbumsRef.current ? 1 : 0) - orbitOpacityRef.current) * 0.15;
                    longPressScaleBoostRef.current += ((showAlbumsRef.current ? 0.3 : 0) - longPressScaleBoostRef.current) * 0.1;

                    // Sphere physical size reaction
                    const vol = volumeRef.current;
                    const baseScale = 0.2 + (vol * 0.8); 
                    const targetScale = baseScale + (bassReact * 0.08 * vol) + longPressScaleBoostRef.current;
                    spherePointCloud.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.2);
                    
                    // Perspective-Correct Ring Scaling using geometric visual contours
                    // A 3D sphere visually dilates beyond its physical radius due to tangent perspective projection.
                    // This math dynamically adjusts the flat 2D Torus ring to maintain an exact visual 0.025 margin avoiding sphere intersection!
                    if (ringGroupRef.current) {
                        const D = 4.7434; // distance from camera(y:1.5, z:4.5) to origin(0,0,0)
                        const R_sphere = 2.0 * spherePointCloud.scale.x;
                        const L = Math.sqrt(Math.max(0.1, D*D - R_sphere*R_sphere));
                        const visualRadiusSphere = R_sphere / L;
                        
                        const targetRingRadius = (visualRadiusSphere + 0.025) * D; // 0.025 is the constant visual gap
                        const targetRingScale = targetRingRadius / 2.2; // 2.2 is the base Torus geometry radius
                        
                        ringGroupRef.current.scale.set(targetRingScale, targetRingScale, targetRingScale);
                    }

                    // Update Progress Ring (even if paused, to reflect track resets/seek updates)
                    if (audioCtxRef.current && durationRef.current && !isDraggingProgressRef.current) {
                        let prog = 0;
                        if (isPlayingRef.current) {
                            if (!sourceNodeRef.current) {
                                prog = 0; // Loading state
                            } else {
                                const elapsed = audioCtxRef.current.currentTime - startTimeRef.current + playbackTimeRef.current;
                                prog = Math.min(1.0, Math.max(0.0, elapsed / durationRef.current));
                            }
                        } else {
                            // Paused or completely stopped state (retains manual seeks or returns to 0 on new track)
                            prog = Math.min(1.0, Math.max(0.0, playbackTimeRef.current / durationRef.current));
                        }
                        
                        // Snappy backward jump instantly upon track skip or manual reset
                        if (prog < ringUniformsRef.current.progress.value - 0.05) {
                            ringUniformsRef.current.progress.value = prog;
                        } else {
                            ringUniformsRef.current.progress.value += (prog - ringUniformsRef.current.progress.value) * 0.3;
                        }
                    }
                    
                    // Native Knob Orbit Trajectory
                    if (progressKnobRef.current && ringUniformsRef.current) {
                        const currentProg = ringUniformsRef.current.progress.value;
                        const theta = currentProg * Math.PI * 2;
                        progressKnobRef.current.position.x = 2.2 * Math.cos(theta);
                        progressKnobRef.current.position.y = 2.2 * Math.sin(theta);
                        progressKnobRef.current.position.z = 0;
                    }

                    // Dynamic Orbit Radius hugging the actively scaled sphere
                    const currentSphereOuterRadius = 2.0 * spherePointCloud.scale.x;
                    const dynamicOrbitRadius = showAlbumsRef.current ? currentSphereOuterRadius + 0.6 : 0.01;
                    orbitRadiusRef.current += (dynamicOrbitRadius - orbitRadiusRef.current) * 0.15;

                    // Sphere Engine visual parameters (maintain visibility during long press + Time loop)
                    const sphereOpTarget = 1.1 + (bassReact * 0.4); // Noticeably brighter global opacity resting at 1.1 mapping AdditiveBlending beautifully
                    if (sphereUniformsRef.current) {
                        sphereUniformsRef.current.uGlobalOpacity.value += (sphereOpTarget - sphereUniformsRef.current.uGlobalOpacity.value) * 0.1;
                        sphereUniformsRef.current.uTime.value += 0.02; // Push internal shader clock
                    }

                    // Unified Rotation Loop
                    carouselAngleRef.current += (targetCarouselAngleRef.current - carouselAngleRef.current) * 0.15;
                    
                    // Idle Auto-Rotation (Smooth slowly, Continuous Y-Axis Spin, Only When Playing)
                    if (isPlayingRef.current) {
                        autoRotateAngleRef.current += 0.001; 
                    }
                    
                    // Y-axis integrates auto-rotation and interactive swivel (Negative sign synchronizes sphere geometry with orbit belt direction)
                    // Scaled rotation multiplier up drastically (2.2x) giving the swipe a highly responsive and pronounced spin
                    spherePointCloud.rotation.y = -autoRotateAngleRef.current - (carouselAngleRef.current * (Math.PI / 180) * 2.2);
                    spherePointCloud.rotation.z = 0; // Ensure Z is locked

                    // --- Carousel 3D Orbital Trajectory Animation ---
                    albumMeshes.forEach((mesh, i) => {
                        let localAngle = (i * 12) - carouselAngleRef.current; // Snug 12deg spacing
                        while(localAngle > 180) localAngle -= 360;
                        while(localAngle < -180) localAngle += 360;
                        
                        const absAngle = Math.abs(localAngle);
                        const angleRad = localAngle * (Math.PI / 180);
                        
                        // Center emphasis peak (sharper due to 12 deg spacing)
                        const peak = Math.pow(Math.max(0, Math.cos(angleRad)), 12);
                        
                        // Make out-of-center items physically dimmer and fainter
                        const baseVis = Math.max(0, 1 - (absAngle / 120));
                        const itemBaseOpacity = baseVis * (0.3 + 0.7 * peak);
                        mesh.material.opacity = itemBaseOpacity * orbitOpacityRef.current;
                        
                        const r = orbitRadiusRef.current;
                        mesh.position.x = Math.sin(angleRad) * r;
                        mesh.position.z = Math.cos(angleRad) * r;
                        mesh.rotation.y = localAngle * (Math.PI / 180);

                        const targetItemScale = 0.6 + 0.6 * peak; // 1.2 center, 0.6 outer
                        mesh.scale.setScalar(targetItemScale * Math.max(0.1, orbitOpacityRef.current));

                        const isCenter = absAngle < 6;
                        // Center is pure white (original image colors, 100% clarity), outer is dimmed to 0x666666
                        const targetColor = isCenter ? new THREE.Color(0xffffff) : new THREE.Color(0x666666);
                        mesh.material.color.lerp(targetColor, 0.1);
                    });

                    renderer.render(scene, camera);
                    animationFrameId = requestAnimationFrame(renderCanvas);
                };
                renderCanvas();

                const handleResize = () => {
                    camera.aspect = mount.clientWidth / mount.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(mount.clientWidth, mount.clientHeight);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationFrameId);
                    mount.removeChild(renderer.domElement);
                    sphereGeometry.dispose();
                    sphereMaterial.dispose();
                    
                    albumMeshes.forEach(mesh => {
                        mesh.material.map.dispose();
                        mesh.material.dispose();
                        mesh.geometry.dispose();
                    });
                    
                    renderer.dispose();
                    
                    if (sourceNodeRef.current) {
                        safeStopAndDisconnect(sourceNodeRef.current);
                    }
                    if (audioCtxRef.current && audioCtxRef.current.state !== 'closed') {
                        audioCtxRef.current.close();
                    }
                };
            }, []); // Empty dependency ensures scene only initializes once

            const togglePlay = () => {
                if (!isLoaded || !audioBufferRef.current || !audioCtxRef.current) return;
                
                if (audioCtxRef.current.state === 'suspended') {
                    audioCtxRef.current.resume();
                }

                if (isPlayingRef.current) {
                    if (sourceNodeRef.current) {
                        safeStopAndDisconnect(sourceNodeRef.current);
                        sourceNodeRef.current = null;
                        
                        const elapsed = audioCtxRef.current.currentTime - startTimeRef.current;
                        playbackTimeRef.current += elapsed;
                    }
                    isPlayingRef.current = false;
                    setIsPlaying(false);
                } else {
                    const source = audioCtxRef.current.createBufferSource();
                    source.buffer = audioBufferRef.current;
                    
                    source.connect(analyserRef.current);
                    analyserRef.current.connect(gainNodeRef.current);
                    gainNodeRef.current.connect(audioCtxRef.current.destination);
                    
                    source.onended = () => {
                        playbackTimeRef.current = 0;
                        targetCarouselAngleRef.current += 12;
                        setTrackIndex(prev => (prev + 1) % tracks.length);
                    };

                    const offset = playbackTimeRef.current % audioBufferRef.current.duration;
                    source.start(0, offset);
                    
                    startTimeRef.current = audioCtxRef.current.currentTime;
                    sourceNodeRef.current = source;
                    
                    isPlayingRef.current = true;
                    setIsPlaying(true);
                }
            };

            const cancelLongPress = () => {
                if (longPressTimerRef.current) {
                    clearTimeout(longPressTimerRef.current);
                    longPressTimerRef.current = null;
                }
            };

            const formatTime = (secs) => {
                const m = Math.floor(secs / 60);
                const s = Math.floor(secs % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            const updateProgressFromScreen = (clientX, clientY) => {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const dx = clientX - centerX;
                const dy = clientY - centerY;
                // negative dy because screen Y goes down, we want 12 o'clock at top (-Y)
                let angle = Math.atan2(dx, -dy);
                if (angle < 0) angle += Math.PI * 2;
                
                const prog = angle / (Math.PI * 2);
                progressDragValueRef.current = prog;
                ringUniformsRef.current.progress.value = prog;
                
                if (durationRef.current) {
                    setDragTimeDisplay({
                        current: formatTime(prog * durationRef.current),
                        total: formatTime(durationRef.current)
                    });
                }
            };

            const seekTo = (progress) => {
                if (!audioBufferRef.current) return;
                
                if (sourceNodeRef.current && isPlayingRef.current) {
                    safeStopAndDisconnect(sourceNodeRef.current);
                    sourceNodeRef.current = null;
                }
                
                playbackTimeRef.current = progress * durationRef.current;
                ringUniformsRef.current.progress.value = progress;
                
                if (isPlayingRef.current) {
                    const newSource = audioCtxRef.current.createBufferSource();
                    newSource.buffer = audioBufferRef.current;
                    
                    // Route ONLY to analyser. The analyser is already persistently connected to the gainNode!
                    // Connecting to both creates two parallel signal paths causing phase cancellation / loud distorted audio
                    newSource.connect(analyserRef.current); 
                    
                    newSource.onended = () => {
                        playbackTimeRef.current = 0;
                        targetCarouselAngleRef.current += 12;
                        setTrackIndex(prev => (prev + 1) % tracks.length);
                    };
                    
                    newSource.start(0, playbackTimeRef.current);
                    startTimeRef.current = audioCtxRef.current.currentTime;
                    sourceNodeRef.current = newSource;
                }
            };

            const handlePointerDown = (e) => {
                if (cameraRef.current && mountRef.current) {
                    const rect = mountRef.current.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    
                    mouseRef.current.x = (x / rect.width) * 2 - 1;
                    mouseRef.current.y = -(y / rect.height) * 2 + 1;
                    
                    raycasterRef.current.setFromCamera(mouseRef.current, cameraRef.current);
                    
                    // Check if hit progress ring
                    if (hitRingRef.current) {
                        const hitIntersects = raycasterRef.current.intersectObject(hitRingRef.current);
                        if (hitIntersects.length > 0) {
                            isDraggingProgressRef.current = true;
                            pointerDownRef.current = true;
                            pointerStartXRef.current = e.clientX;
                            pointerStartYRef.current = e.clientY;
                            pointerAxisRef.current = 'progress';
                            updateProgressFromScreen(e.clientX, e.clientY);
                            cancelLongPress();
                            return; // Bypass sphere logic
                        }
                    }
                    
                    // Sphere has base radius 2.0 scaled dynamically
                    if (sphereRef.current) {
                        const currentScale = sphereRef.current.scale.x;
                        const boundingSphere = new THREE.Sphere(new THREE.Vector3(0, 0, 0), 2.0 * currentScale);
                        
                        if (!raycasterRef.current.ray.intersectsSphere(boundingSphere)) {
                            return; // Ignore clicks on the empty black space
                        }
                    }
                }

                pointerDownRef.current = true;
                pointerStartXRef.current = e.clientX;
                pointerStartYRef.current = e.clientY;
                pointerAxisRef.current = null;
                dragStartVolumeRef.current = volumeRef.current;
                dragStartAngleRef.current = targetCarouselAngleRef.current;
                
                longPressTimerRef.current = setTimeout(() => {
                    showAlbumsRef.current = true;
                    setShowAlbums(true);
                }, 400); // 400ms long press threshold
            };

            const handlePointerMove = (e) => {
                if (!pointerDownRef.current) return;
                
                if (isDraggingProgressRef.current) {
                    updateProgressFromScreen(e.clientX, e.clientY);
                    return;
                }
                
                const deltaX = e.clientX - pointerStartXRef.current;
                const deltaY = e.clientY - pointerStartYRef.current;
                
                if (showAlbumsRef.current) {
                    targetCarouselAngleRef.current = dragStartAngleRef.current - (deltaX / 80) * 12; // Inverted drag direction
                    return;
                }

                // Cancel long press if moving significantly
                if (Math.abs(deltaX) > 10 || Math.abs(deltaY) > 10) {
                    cancelLongPress();
                }
                
                if (!pointerAxisRef.current && (Math.abs(deltaX) > 10 || Math.abs(deltaY) > 10)) {
                    pointerAxisRef.current = Math.abs(deltaY) > Math.abs(deltaX) ? 'v' : 'h';
                }

                if (pointerAxisRef.current === 'v') {
                    // Update volume based on vertical drag
                    let newVol = dragStartVolumeRef.current - (deltaY / 200); // 200px drag = full volume change
                    newVol = Math.max(0, Math.min(1, newVol));
                    
                    if (gainNodeRef.current) {
                        gainNodeRef.current.gain.value = newVol;
                    }
                    volumeRef.current = newVol;
                    setVolume(newVol);
                }
            };

            const handlePointerUp = (e) => {
                cancelLongPress();
                
                if (isDraggingProgressRef.current) {
                    isDraggingProgressRef.current = false;
                    setDragTimeDisplay(null);
                    seekTo(progressDragValueRef.current);
                    pointerDownRef.current = false;
                    pointerAxisRef.current = null;
                    return;
                }
                
                if (showAlbumsRef.current) {
                    showAlbumsRef.current = false;
                    setShowAlbums(false);
                    pointerDownRef.current = false;
                    pointerAxisRef.current = null;
                    
                    const Math_round = Math.round; // minifier safe
                    const exactIndex = Math_round(targetCarouselAngleRef.current / 12);
                    targetCarouselAngleRef.current = exactIndex * 12;
                    
                    let newIndex = ((exactIndex % tracks.length) + tracks.length) % tracks.length;
                    
                    if (newIndex !== trackIndex) {
                        setTrackIndex(newIndex);
                        isPlayingRef.current = true;
                        setIsPlaying(true);
                    } else if (!isPlayingRef.current) {
                        togglePlay();
                    }
                    return; // Do not trigger click or normal swipe
                }

                if (!pointerDownRef.current) return;
                pointerDownRef.current = false;
                
                const deltaX = e.clientX - pointerStartXRef.current;
                
                if (pointerAxisRef.current === 'h' && Math.abs(deltaX) > 40) {
                    // Horizontal swipe (Inverted to match standard touch interactions)
                    if (deltaX < 0) { // Swipe Left -> Next Track
                        setTrackIndex(prev => (prev + 1) % tracks.length);
                        targetCarouselAngleRef.current += 12;
                    } else { // Swipe Right -> Prev Track
                        setTrackIndex(prev => (prev - 1 + tracks.length) % tracks.length);
                        targetCarouselAngleRef.current -= 12;
                    }
                } else if (!pointerAxisRef.current) {
                    // Click
                    togglePlay();
                }
                pointerAxisRef.current = null;
            };

            const playingTrackTitle = tracks[trackIndex].title;
            const playingTrackArtist = tracks[trackIndex].artist;

            return (
                <div 
                    ref={mountRef} 
                    style={{ width: '100%', height: '100%', touchAction: 'none', position: 'relative' }} 
                    onPointerDown={handlePointerDown} 
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onPointerLeave={handlePointerUp}
                >
                    {/* Fixed Bottom Track Info */}
                    <div style={{
                        position: 'absolute',
                        bottom: '30px',
                        left: '50%',
                        transform: 'translateX(-50%)',
                        color: 'white',
                        textAlign: 'center',
                        fontFamily: 'sans-serif',
                        pointerEvents: 'none',
                        zIndex: 20,
                        padding: '15px 30px',
                        borderRadius: '15px',
                        textShadow: '0px 2px 10px rgba(0,0,0,0.8)'
                    }}>
                        <div style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '8px', letterSpacing: '0.5px' }}>
                            {playingTrackTitle}
                        </div>
                        <div style={{ fontSize: '14px', color: 'rgba(255,255,255,0.7)' }}>
                            {playingTrackArtist}
                        </div>
                    </div>

                    {/* Progress Drag Time HUD */}
                    {dragTimeDisplay && (
                        <div style={{
                            position: 'absolute',
                            top: '40%',
                            left: '50%',
                            transform: 'translate(-50%, -50%)',
                            color: 'white',
                            textAlign: 'center',
                            fontFamily: 'monospace',
                            fontSize: '28px',
                            fontWeight: 'bold',
                            pointerEvents: 'none',
                            zIndex: 30,
                            textShadow: '0 0 15px #d1aaff',
                            background: 'rgba(42, 26, 74, 0.5)',
                            padding: '10px 20px',
                            borderRadius: '20px',
                            border: '2px solid rgba(209, 170, 255, 0.4)'
                        }}>
                            {dragTimeDisplay.current} <span style={{fontSize:'20px',color:'rgba(255,255,255,0.5)'}}>/ {dragTimeDisplay.total}</span>
                        </div>
                    )}
                </div>
            );
        }

        // Use modern React 18 createRoot usage directly without needing a bundled import
        const rootElement = document.getElementById('root');
        // ReactDOM is loaded via script tag globally
        const root = ReactDOM.createRoot(rootElement);
        root.render(<PointCloudPlayer />);
    </script>
</body>
</html>
